springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true

application.transactions-db.url=jdbc:h2:file:./transaction
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

application.rules.url=jdbc:h2:file:./recommendations
application.rules.username=sa
application.rules.password=
application.rules.driver-class-name=org.h2.Driver

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-init.sql